<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IRISH Soccer Scoreboard</title>

<style>
body{
  font-family: Arial, sans-serif;
  background:#f4f4f4;
  text-align:center;
  padding:20px;
}

.container{
  max-width:400px;
  margin:auto;
  background:white;
  padding:20px;
  border-radius:12px;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

input{
  width:100%;
  padding:10px;
  margin:6px 0;
  border-radius:8px;
  border:1px solid #ccc;
  font-size:16px;
}

.score{
  font-size:48px;
  font-weight:bold;
  margin:15px 0;
}

button{
  padding:10px 15px;
  margin:5px;
  border:none;
  border-radius:8px;
  font-size:16px;
  cursor:pointer;
}

.plus{ background:#1c7c3c; color:white; }
.minus{ background:#c0392b; color:white; }
.export{ background:black; color:white; width:100%; margin-top:15px; }

.scorer-list{
  text-align:left;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="container">

<h2>IRISH Soccer Scoreboard</h2>

<input type="text" id="tournament" placeholder="Tournament Name">
<input type="text" id="category" placeholder="Category">
<input type="text" id="opponentName" placeholder="Opponent Name">

<div class="score">
IRISH <span id="scoreA">0</span> - 
<span id="scoreB">0</span>
</div>

<button class="plus" onclick="addGoal()">+1 IRISH Goal</button>
<button class="minus" onclick="removeGoal()">-1</button>

<br><br>

<button class="plus" onclick="addOpponent()">+1 Opponent</button>
<button class="minus" onclick="removeOpponent()">-1</button>

<div class="scorer-list" id="scorerList"></div>

<button class="export" onclick="exportImage()">📸 Share Final Score</button>

</div>

<script>
let scoreA = 0;
let scoreB = 0;
let scorersA = [];

function updateDisplay(){
  document.getElementById("scoreA").innerText = scoreA;
  document.getElementById("scoreB").innerText = scoreB;

  const list = document.getElementById("scorerList");
  if(scorersA.length === 0){
    list.innerHTML = "";
    return;
  }

  list.innerHTML = "<strong>Goal Scorers:</strong><br>";
  scorersA.forEach(s => {
    list.innerHTML += "• " + s + "<br>";
  });
}

function addGoal(){
  const player = prompt("Player name:");
  if(player){
    scoreA++;
    scorersA.push(player);
    updateDisplay();
  }
}

function removeGoal(){
  if(scoreA > 0){
    scoreA--;
    scorersA.pop();
    updateDisplay();
  }
}

function addOpponent(){
  scoreB++;
  updateDisplay();
}

function removeOpponent(){
  if(scoreB > 0){
    scoreB--;
    updateDisplay();
  }
}

function exportImage(){

  const canvas = document.createElement("canvas");
  canvas.width = 1080;
  canvas.height = 1080;
  const ctx = canvas.getContext("2d");

  // Background Gradient
  const gradient = ctx.createLinearGradient(0, 0, 0, 1080);
  gradient.addColorStop(0, "#0f5f2e");
  gradient.addColorStop(1, "#013d1b");
  ctx.fillStyle = gradient;
  ctx.fillRect(0, 0, 1080, 1080);

  const centerX = 540;

  const logo = new Image();
  logo.src = "logo.png";

  logo.onload = async function () {

    // LOGO
    const logoSize = 170;
    ctx.drawImage(
      logo,
      centerX - logoSize / 2,
      70,
      logoSize,
      logoSize
    );

    ctx.fillStyle = "#ffffff";
    ctx.textAlign = "center";

    // FINAL SCORE LABEL
    ctx.font = "bold 55px Arial";
    ctx.fillText("FINAL SCORE", centerX, 280);

    // Tournament
    ctx.font = "26px Arial";
    ctx.fillText(
      document.getElementById("tournament").value,
      centerX,
      330
    );

    // Category
    ctx.fillText(
      document.getElementById("category").value,
      centerX,
      365
    );

    // BIG SCORE
    ctx.font = "bold 130px Arial";
    ctx.fillText(scoreA + "  -  " + scoreB, centerX, 560);

    // TEAM NAMES
    ctx.font = "bold 42px Arial";
    ctx.fillText("IRISH", 330, 640);
    ctx.fillText(
      document.getElementById("opponentName").value,
      750,
      640
    );

    // Divider Line
    ctx.strokeStyle = "rgba(255,255,255,0.4)";
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(200, 690);
    ctx.lineTo(880, 690);
    ctx.stroke();

    // Date
    ctx.font = "24px Arial";
    ctx.fillText(
      new Date().toLocaleDateString(),
      centerX,
      730
    );

    // Goal Scorers
    if (scorersA.length > 0) {
      ctx.textAlign = "left";
      ctx.font = "bold 28px Arial";
      ctx.fillText("Goal Scorers", 200, 800);

      ctx.font = "24px Arial";
      let y = 840;

      scorersA.forEach(s => {
        ctx.fillText("• " + s, 220, y);
        y += 32;
      });
    }

    // Share or Download
    canvas.toBlob(async function(blob) {

      const file = new File([blob], "irish-final-score.png", {
        type: "image/png"
      });

      if(navigator.share && navigator.canShare({files:[file]})){
        await navigator.share({
          files:[file],
          title:"IRISH Final Score"
        });
      } else {
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = "irish-final-score.png";
        link.click();
      }

    }, "image/png");
  };
}
</script>

</body>
</html>
